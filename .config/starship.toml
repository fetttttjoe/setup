# Starship prompt config — uses Nerd Font icons (FiraCode Nerd Font Mono).
# Docs: https://starship.rs/config/

# Two-line prompt: info on top, the actual cursor on its own line.
# TokyoNight-aligned palette.
format = """
[╭─](bold #414868) $os$username$hostname$directory$git_branch$git_status$git_state\
$nodejs$bun$python$rust$golang$java$php$ruby$dotnet\
$docker_context$kubernetes$package\
$cmd_duration\
$line_break\
[╰─](bold #414868)$character"""

add_newline = true
command_timeout = 1000

# ── Prompt cursor ─────────────────────────────────────────────────────────
[character]
success_symbol = "[](bold #9ece6a)"
error_symbol   = "[](bold #f7768e)"
vimcmd_symbol  = "[](bold #7dcfff)"

# ── User / host ───────────────────────────────────────────────────────────
[os]
disabled = false
format = "[$symbol]($style) "
style  = "bold #bb9af7"

[os.symbols]
Ubuntu   = "Ubuntu"
Debian   = "Debian"
Arch     = "Arch"
Fedora   = "Fedora"
Macos    = "macOS"
Linux    = "Linux"
Windows  = "Windows"

[username]
show_always = false              # only show when SSH or root
style_user  = "bold #e0af68"
style_root  = "bold #f7768e"
format      = "[$user]($style)@"

[hostname]
ssh_only = true
format   = "[$hostname](bold #e0af68) "

# ── Directory ─────────────────────────────────────────────────────────────
[directory]
style              = "bold #7aa2f7"
truncation_length  = 4
truncate_to_repo   = true
read_only          = " 󰌾"
read_only_style    = "#f7768e"
format             = "[$path]($style)[$read_only]($read_only_style) "

# ── Git ───────────────────────────────────────────────────────────────────
[git_branch]
symbol = "git:"
style  = "bold #bb9af7"
format = "on [$symbol$branch]($style) "

[git_status]
style       = "bold #f7768e"
format      = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted  = "="
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
untracked   = "?${count}"
stashed     = "\\$"
modified    = "!${count}"
staged      = "+${count}"
renamed     = "»${count}"
deleted     = "✘${count}"

[git_state]
style = "bold #e0af68"
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "

# ── Languages / runtimes ──────────────────────────────────────────────────
[nodejs]
symbol = "node "
style  = "bold #9ece6a"
format = "via [$symbol($version )]($style)"

[bun]
symbol = "🥟 "
style  = "bold #e0af68"
format = "via [$symbol($version )]($style)"

[python]
symbol = "py "
style  = "bold #e0af68"
format = "via [$symbol(\\($virtualenv\\) )($version )]($style)"

[rust]
symbol = "rust "
style  = "bold #e0af68"
format = "via [$symbol($version )]($style)"

[golang]
symbol = "go "
style  = "bold #7dcfff"
format = "via [$symbol($version )]($style)"

[java]
symbol = "java "
style  = "bold #f7768e"
format = "via [$symbol($version )]($style)"

[php]
symbol = "php "
style  = "bold #bb9af7"

[ruby]
symbol = "ruby "
style  = "bold #f7768e"

[dotnet]
symbol = ".NET "
style  = "bold #bb9af7"

# ── DevOps ────────────────────────────────────────────────────────────────
[docker_context]
symbol = "docker "
style  = "bold #7dcfff"
format = "via [$symbol$context]($style) "
only_with_files = true

[kubernetes]
disabled = false
symbol   = "󱃾 "
style    = "bold #7aa2f7"
format   = "on [$symbol$context( \\($namespace\\))]($style) "

[package]
symbol = "󰏗 "
style  = "bold #e0af68"
format = "via [$symbol$version]($style) "

# ── Command duration ──────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000                  # only show if command took >2s
style    = "bold #e0af68"
format   = "took [ $duration]($style) "

# ── Disabled (too noisy in this layout) ───────────────────────────────────
[battery]
disabled = true

[time]
disabled = true                  # flip to false if you want a clock
format   = "[ $time]($style) "
style    = "#414868"

[memory_usage]
disabled = true
